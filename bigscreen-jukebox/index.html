<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bigscreen Jukebox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!--
    Bigscreen Jukebox — fullscreen 10-foot TV music UI.
    One app, four screens (Now Playing / Search / Lyrics / Visualizer) that share
    a single playback clock + beat engine. Screens are toggled by class, not pages.
    Markup is intentionally minimal here; lists (tabs, results, queue, lyrics,
    modes, player menu) are generated in app.js. See styles.css for sections.
  -->
  <div class="app" id="app" data-screen="now">

    <!-- ============================ TAB BAR ============================ -->
    <header class="topbar">
      <div class="wordmark">
        <span class="wordmark-dot"></span>
        <span>Bigscreen <span class="wordmark-accent">Jukebox</span></span>
      </div>

      <nav class="tabs" id="tabs"><!-- buttons injected by app.js --></nav>

      <div class="topright" id="topright">
        <!-- Player chip (Now Playing only) -->
        <div class="player-wrap">
          <button class="player-chip" id="playerChip" title="Choose playback device">
            <span class="live-dot"></span>
            Playing on&nbsp;<b id="playerName">Living Room</b>&nbsp;&#9662;
          </button>
          <div class="player-menu" id="playerMenu" hidden><!-- injected --></div>
        </div>
        <!-- Guest toggle (becomes the corner QR card when on) -->
        <button class="guest-btn" id="guestBtn" title="Show guest QR (press G)">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M3 3h7v7H3V3zm2 2v3h3V5H5zM3 14h7v7H3v-7zm2 2v3h3v-3H5zM14 3h7v7h-7V3zm2 2v3h3V5h-3zM14 14h3v3h-3v-3zm5 0h2v2h-2v-2zm-5 5h3v2h-3v-2zm5 1h2v1h-2v-1z"/></svg>
          Guest
        </button>
      </div>
    </header>

    <!-- ========================== NOW PLAYING ========================== -->
    <section class="screen now is-active" id="screen-now">
      <div class="np-bg" id="npBg"></div>
      <div class="np-overlay"></div>

      <!-- Up Next queue (stacks under the QR card when guest mode is on) -->
      <aside class="queue" id="queue">
        <div class="queue-head">
          <span class="queue-title">Up Next</span>
          <span class="queue-count" id="queueCount">5 songs</span>
        </div>
        <div class="queue-list" id="queueList"><!-- injected --></div>
      </aside>

      <div class="np-art-wrap">
        <div class="np-art" id="npArt"></div>
      </div>

      <div class="np-lower">
        <div class="np-title" id="npTitle">Neon Tide</div>
        <div class="np-sub" id="npSub">Marisol Vega &mdash; Afterglow</div>

        <div class="progress">
          <span class="time" id="elapsed">0:00</span>
          <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
          <span class="time time-right" id="total">3:44</span>
        </div>

        <div class="transport">
          <div class="transport-spacer"></div>
          <div class="transport-mid">
            <button class="icon-btn" id="prevBtn" title="Previous (Left)">
              <svg viewBox="0 0 24 24" width="54" height="54" fill="currentColor"><path d="M6 6h2.6v12H6zM20 6v12l-9.4-6z"/></svg>
            </button>
            <button class="play-btn" id="playBtn" title="Play / Pause (Space)">
              <svg class="ic-pause" viewBox="0 0 24 24" width="46" height="46" fill="currentColor"><rect x="6" y="5" width="4.2" height="14" rx="1.3"/><rect x="13.8" y="5" width="4.2" height="14" rx="1.3"/></svg>
              <svg class="ic-play" viewBox="0 0 24 24" width="48" height="48" fill="currentColor"><path d="M7 5l13 7-13 7z"/></svg>
            </button>
            <button class="icon-btn" id="nextBtn" title="Next (Right)">
              <svg viewBox="0 0 24 24" width="54" height="54" fill="currentColor"><path d="M18 6h-2.6v12H18zM4 6v12l9.4-6z"/></svg>
            </button>
          </div>
          <div class="volume">
            <svg viewBox="0 0 24 24" width="40" height="40" fill="none"><path d="M4 9v6h3.5L13 19V5L7.5 9H4z" fill="#fff"/><path d="M16 8.5a4.5 4.5 0 010 7" stroke="rgba(255,255,255,.85)" stroke-width="2" stroke-linecap="round"/><path d="M18.7 6a8 8 0 010 12" stroke="rgba(255,255,255,.45)" stroke-width="2" stroke-linecap="round"/></svg>
            <div class="volume-track"><div class="volume-fill"></div></div>
          </div>
        </div>
      </div>
    </section>

    <!-- ============================ SEARCH ============================ -->
    <section class="screen search" id="screen-search">
      <div class="search-field">
        <svg viewBox="0 0 24 24" width="42" height="42" fill="none"><circle cx="11" cy="11" r="7" stroke="rgba(255,255,255,.55)" stroke-width="2.2"/><path d="M21 21l-4.3-4.3" stroke="rgba(255,255,255,.55)" stroke-width="2.2" stroke-linecap="round"/></svg>
        <input id="searchInput" type="text" placeholder="Search songs, artists, albums" autocomplete="off">
      </div>
      <div class="results" id="results"><!-- injected --></div>
    </section>

    <!-- ============================ LYRICS ============================ -->
    <section class="screen lyrics" id="screen-lyrics">
      <div class="lyrics-glow"></div>
      <div class="lyrics-viewport">
        <div class="lyrics-wrap" id="lyricsWrap"><!-- injected --></div>
      </div>
    </section>

    <!-- ========================== VISUALIZER ========================== -->
    <section class="screen visualizer" id="screen-visualizer">
      <canvas id="viz" width="1920" height="1080"></canvas>
      <div class="beat-ctrl">
        <div class="beat-slider">
          <span class="beat-label">BEAT</span>
          <input id="beatRange" type="range" min="0" max="2.4" step="0.05" value="1">
        </div>
        <button class="source-btn" id="sourceBtn" title="Beat source — click to use live mic audio">
          <span class="source-dot"></span>
          <span id="sourceLabel">Simulated</span>
        </button>
      </div>
      <div class="mode-bar" id="modeBar"><!-- injected --></div>
    </section>

    <!-- ===================== GUEST QR (corner card) ==================== -->
    <button class="qr-card" id="qrCard" title="Tap to turn guest mode off">
      <canvas id="qrCanvas" width="180" height="180"></canvas>
      <div class="qr-text">
        <div class="qr-title">Scan to add songs</div>
        <div class="qr-url" id="qrUrl">jukebox.local/guest</div>
      </div>
    </button>

  </div>

  <script src="app.js"></script>
</body>
</html>
